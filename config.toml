    <li style="margin-bottom: 8px;">
      <a href="https://smartdorm-orpin.vercel.app/" target="_blank" style="color: #00b0ff; text-decoration: underline; padding: 0;">👉 Visit Website</a>
    </li>
    <li style="margin-bottom: 8px; color: #ccc; font-size: 0.85em; line-height: 1.4;">
      <strong style="color: #fff;">🔑 Admin Account:</strong><br/>
      TK: <code style="background: rgba(255,255,255,0.15); padding: 1px 3px; border-radius: 3px; color: #fff; font-family: monospace;">chithanh_admin</code><br/>
      MK: <code style="background: rgba(255,255,255,0.15); padding: 1px 3px; border-radius: 3px; color: #fff; font-family: monospace;">ThanhPlus2026_Secure@Admin_!#</code>
    </li>
    <li style="color: #ccc; font-size: 0.85em; line-height: 1.4;">
      <strong style="color: #fff;">🔑 User Account:</strong><br/>
      TK: <code style="background: rgba(255,255,255,0.15); padding: 1px 3px; border-radius: 3px; color: #fff; font-family: monospace;">chithanh123</code><br/>
      MK: <code style="background: rgba(255,255,255,0.15); padding: 1px 3px; border-radius: 3px; color: #fff; font-family: monospace;">Chithanh123@</code>
