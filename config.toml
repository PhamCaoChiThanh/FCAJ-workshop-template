baseURL = "https://phamcaochithanh.github.io/FCAJ-workshop-template/"
relativeURLs = true
canonifyURLs = true
defaultContentLanguage = "en"

# Change the default theme to be use when building the site with Hugo
theme = "hugo-theme-learn"

# For search functionality
[outputs]
home = [ "HTML", "RSS", "JSON"]

[params]
  # Change default color scheme with a variant one. Can be "red", "blue", "green".
  themeVariant = "workshop"
  # Git hub repo link
  editURL = ""
  description = ""
  author = "thienlh@thienlu.com"
  showVisitedLinks = true
  disableBreadcrumb = false
  disableNextPrev = false
  
[Languages]
[Languages.en]
title = "Internship Report"
weight = 1
languageName = "English"

[[Languages.en.menu.shortcuts]]
name = """<style>
  .custom-shortcuts-details summary::-webkit-details-marker { display:none; }
  .custom-shortcuts-details summary { list-style: none; }
  .custom-shortcuts-details[open] .caret-icon { transform: rotate(180deg); }
  .caret-icon { transition: transform 0.2s; }
</style>
<details class="custom-shortcuts-details" style="cursor: pointer; outline: none; margin-bottom: 5px;">
  <summary style="display: flex; align-items: center; justify-content: space-between; outline: none; color: #fff; font-weight: bold; padding: 5px 0px;">
    <span><i class="fas fa-project-diagram"></i> Group's Workshop Project</span>
    <i class="fas fa-caret-down caret-icon" style="font-size: 0.85em; color: #ccc; margin-right: 15px;"></i>
  </summary>
